<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Churn Predictor</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        input::placeholder {
            color: #888;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #fff;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ddd;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>🚀 AI Churn Predictor</h2>

    <form id="churnForm">

        <input type="number" placeholder="Account length" name="Account length" required />
        <input type="number" placeholder="Area code" name="Area code" required />
        <input type="number" placeholder="International plan (0/1)" name="International plan" required />
        <input type="number" placeholder="Voice mail plan (0/1)" name="Voice mail plan" required />
        <input type="number" placeholder="Number vmail messages" name="Number vmail messages" required />

        <input type="number" placeholder="Total day minutes" name="Total day minutes" required />
        <input type="number" placeholder="Total day calls" name="Total day calls" required />
        <input type="number" placeholder="Total day charge" name="Total day charge" required />

        <input type="number" placeholder="Total eve minutes" name="Total eve minutes" required />
        <input type="number" placeholder="Total eve calls" name="Total eve calls" required />
        <input type="number" placeholder="Total eve charge" name="Total eve charge" required />

        <input type="number" placeholder="Total night minutes" name="Total night minutes" required />
        <input type="number" placeholder="Total night calls" name="Total night calls" required />
        <input type="number" placeholder="Total night charge" name="Total night charge" required />

        <input type="number" placeholder="Total intl minutes" name="Total intl minutes" required />
        <input type="number" placeholder="Total intl calls" name="Total intl calls" required />
        <input type="number" placeholder="Total intl charge" name="Total intl charge" required />

        <input type="number" placeholder="Customer service calls" name="Customer service calls" required />

        <input type="email" placeholder="Enter your email" name="email" required />

        <button type="submit">Predict Now</button>

    </form>

    <div class="footer">
        Built with AI ⚡
    </div>

</div>

<script>
document.getElementById("churnForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const button = document.querySelector("button");
    button.innerText = "Processing...";
    button.disabled = true;

    const formData = new FormData(this);
    let data = {};

    formData.forEach((value, key) => {
        data[key] = isNaN(value) ? value : Number(value);
    });

    try {
        await fetch("https://genai1234.app.n8n.cloud/webhook/churn-predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        alert("✅ Report sent to your email!");
    } catch (err) {
        alert("❌ Something went wrong");
    }

    button.innerText = "Predict Now";
    button.disabled = false;
});
</script>

</body>
</html>
